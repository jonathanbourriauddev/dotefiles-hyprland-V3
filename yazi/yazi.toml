[manager]
ratio = [1, 3, 4]
sort_by = "alphabetical"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
show_hidden = false
show_symlink = true

[preview]
tab_size = 2
max_width = 600
max_height = 900
cache_dir = ""
image_filter = "triangle"
image_quality = 75
sixel_scale = 1.0

[opener]
edit = [
    { run = 'nvim "$@"', desc = "Neovim", block = true },
]
open = [
    { run = 'xdg-open "$@"', desc = "Ouvrir" },
]

[open]
rules = [
    { mime = "text/*", use = "edit" },
    { mime = "application/*", use = "open" },
    { mime = "image/*", use = "open" },
    { mime = "video/*", use = "open" },
    { mime = "audio/*", use = "open" },
]
