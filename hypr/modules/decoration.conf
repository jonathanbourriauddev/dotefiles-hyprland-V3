decoration {
    rounding = 1

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
        ignore_opacity = false
    }

    active_opacity = 1.0
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(1a1a2eee)
        color_inactive = rgba(1a1a2e99)
    }
}
